<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>首爾地鐵小幫手</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <div class="container">
        <h1>🇰🇷 首爾地鐵小幫手</h1>
        
        <div class="tab-menu">
            <button class="tab-btn active" onclick="showTab('single')">單站查詢</button>
            <button class="tab-btn" onclick="routeTab(event)">路線規劃</button>
            <button class="tab-btn" onclick="showTab('map')">地鐵圖</button>
        </div>

        <div id="single" class="content-section active">
            <input type="text" id="stationInput" placeholder="搜尋車站...">
            <button class="search-btn" onclick="findStation()">查詢</button>
            <div id="singleResult"></div>
        </div>

        <div id="route" class="content-section">
            <input type="text" id="startStation" placeholder="出發站">
            <input type="text" id="endStation" placeholder="終點站">
            <button class="search-btn" onclick="findRoute()">規劃路線</button>
            <div id="routeResult"></div>
        </div>

        <div id="map" class="content-section">
            <div class="map-container">
                <img src="_download_map_chinese.jpg" alt="首爾地鐵圖">
            </div>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
        function showTab(tabId) {
            // 隱藏所有區塊
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            // 取消所有按鈕選取狀態
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            // 顯示點選的區塊與按鈕
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>

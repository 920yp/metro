<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>首爾地鐵小幫手</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; background: white; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-height: 100vh; box-sizing: border-box; }
        h1 { font-size: 1.25rem; text-align: center; color: #333; margin-bottom: 20px; }
        .tab-menu { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px 5px; border: none; background: #eee; border-radius: 8px; font-size: 0.85rem; cursor: pointer; }
        .tab-btn.active { background: #00923f; color: white; font-weight: bold; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        
        /* 下拉選單樣式 */
        select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; background-color: #fff; appearance: none; }
        .label-text { font-size: 0.9rem; color: #666; margin-left: 5px; }

        .search-btn { width: 100%; padding: 14px; background: #00923f; color: white; border: none; border-radius: 8px; margin-top: 10px; font-weight: bold; cursor: pointer; }
        .map-container { width: 100%; height: 60vh; overflow: scroll; border: 1px solid #ddd; border-radius: 8px; margin-top: 15px; background: #fafafa; }
        .map-container img { width: 350%; height: auto; display: block; } /* 圖片設大一點方便滑動 */
        .result-card { background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 5px solid #00923f; margin-top: 20px; font-size: 0.95rem; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇰🇷 首爾地鐵小幫手</h1>
        
        <div class="tab-menu">
            <button class="tab-btn active" onclick="showTab('single', this)">單站查詢</button>
            <button class="tab-btn" onclick="showTab('route', this)">路線規劃</button>
            <button class="tab-btn" onclick="showTab('map', this)">地鐵圖</button>
        </div>

        <div id="single" class="content-section active">
            <span class="label-text">選擇車站：</span>
            <select id="stationSelect">
                <option value="">-- 請選擇車站 --</option>
            </select>
            <button class="search-btn" onclick="findStation()">查看詳細資訊</button>
            <div id="singleResult"></div>
        </div>

        <div id="route" class="content-section">
            <span class="label-text">出發站：</span>
            <select id="startSelect"><option value="">-- 請選擇起點 --</option></select>
            <span class="label-text">終點站：</span>
            <select id="endSelect"><option value="">-- 請選擇終點 --</option></select>
            <button class="search-btn" onclick="findRoute()">開始規劃</button>
            <div id="routeResult"></div>
        </div>

        <div id="map" class="content-section">
            <p style="font-size: 0.75rem; color: #888; text-align: center;">💡 提示：圖片較大，可上下左右滑動</p>
            <div class="map-container">
                <img src="metroMap.jpg" alt="首爾地鐵圖">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

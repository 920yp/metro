<body>
    <div class="container">
        </div>

    <script>
        // 直接將所有邏輯寫在這裡，確保按鈕絕對有反應
        function showTab(tabId) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if (event) event.currentTarget.classList.add('active');
        }

        const stationData = [
            { name: "弘大入口", line: "2號線, A'REX", spot: "弘大商圈", transfer: "轉乘機場快線請往地下 4 層" },
            { name: "安國", line: "3號線", spot: "北村韓屋村", transfer: "無需轉乘" },
            { name: "鐘路3街", line: "1, 3, 5號線", spot: "益善洞", transfer: "建議經由3號線中轉" }
        ];

        function findStation() {
            const input = document.getElementById('stationInput').value;
            const res = document.getElementById('singleResult');
            const data = stationData.find(s => s.name.includes(input));
            res.innerHTML = data ? `<div class="result-card"><h3>${data.name}</h3><p>路線：${data.line}</p><p>熱點：${data.spot}</p></div>` : "找不到車站";
        }

        function findRoute() {
            const start = document.getElementById('startStation').value;
            const end = document.getElementById('endStation').value;
            const res = document.getElementById('routeResult');
            res.innerHTML = `<div class="result-card">建議從 ${start} 搭乘地鐵，於乙支路3街轉乘至 ${end}。</div>`;
        }
    </script>
</body>
